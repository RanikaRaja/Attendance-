<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Attendance System</title>

<style>
body {
  text-align: center;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

h2 {
  margin-top: 20px;
}

video {
  width: 90%;
  max-width: 400px;
  border: 3px solid #00ffcc;
  border-radius: 12px;
  margin-top: 20px;
}

button {
  margin-top: 20px;
  padding: 12px 20px;
  font-size: 16px;
  background: #00ffcc;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #00ccaa;
}

#status {
  margin-top: 20px;
  font-size: 18px;
}
</style>

</head>
<body>

<h2>🔥 AI Attendance System</h2>

<video id="video" autoplay muted></video><br>
<button onclick="markAttendance()">Mark Attendance</button>

<p id="status">Initializing...</p>

<!-- Face API -->
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<script>
const video = document.getElementById("video");
const statusText = document.getElementById("status");

// Start camera
async function startVideo() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    statusText.innerText = "📷 Camera Started";
  } catch (err) {
    statusText.innerText = "❌ Camera Access Denied";
  }
}

// Load AI model
async function loadModels() {
  statusText.innerText = "⏳ Loading AI Model...";
  await faceapi.nets.tinyFaceDetector.loadFromUri(
    "https://cdn.jsdelivr.net/npm/face-api.js/models"
  );
  statusText.innerText = "✅ AI Ready";
}

startVideo();
loadModels();

// Attendance function
async function markAttendance() {
  statusText.innerText = "🔍 Detecting Face...";

  const detections = await faceapi.detectAllFaces(
    video,
    new faceapi.TinyFaceDetectorOptions()
  );

  if (detections.length > 0) {
    statusText.innerText = "✅ Attendance Marked Successfully!";
  } else {
    statusText.innerText = "❌ No Face Detected";
  }
}
</script>

</body>
</html>
